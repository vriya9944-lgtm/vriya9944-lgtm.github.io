<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riya Virdi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Caveat:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      /* warm parchment — Fleurs d'Amour background */
      background:#f0e6d2;
      font-family:'DM Sans',sans-serif;
      cursor:none;
    }

    #cur  { position:fixed;width:8px;height:8px;background:#2a1f14;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%); }
    #curR { position:fixed;width:28px;height:28px;border:1.5px solid rgba(42,31,20,.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .1s,top .1s; }

    /* ═══════════════════════════════════════════
       COLLAGE — Fleurs d'Amour style
       Cream background + scattered photos at angles
       3D mouse parallax: each photo has data-depth
       (0 = far / barely moves, 1 = close / moves a lot)
    ═══════════════════════════════════════════ */
    #board {
      position:fixed;
      inset:0;
      will-change:filter,opacity;
    }

    .ph {
      position:absolute;
      overflow:hidden;
      will-change:transform;
    }
    .ph img {
      width:100%; height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    /* polaroid border */
    .pol {
      background:#fff;
      padding:6px 6px 20px;
      box-shadow:0 6px 22px rgba(42,31,20,.18), 0 1px 4px rgba(42,31,20,.12);
    }
    /* borderless shadow */
    .ph:not(.pol) {
      box-shadow:0 4px 20px rgba(42,31,20,.22);
    }

    /* ── photo positions & base rotations ── */

    /* LAYER 0 — back (depth 0.15) */
    .a { width:54vw;height:40vh; top:-3vh; left:18vw; }        /* wide top — concert   */
    .b { width:60vw;height:34vh; bottom:-3vh; left:5vw; }      /* wide bottom — lights */

    /* LAYER 1 — mid-back (depth 0.35) */
    .c { width:30vw;height:56vh; top:6vh;  left:-3vw; }        /* left portrait        */
    .d { width:28vw;height:32vh; bottom:8vh; right:4vw; }      /* btm right            */

    /* LAYER 2 — mid (depth 0.55) */
    .e { width:44vw;height:62vh; top:8vh;  left:26vw; }        /* HERO — centre        */
    .f { width:26vw;height:32vh; bottom:6vh; left:30vw; }      /* reading — overlap    */

    /* LAYER 3 — front (depth 0.85) */
    .g { width:22vw;height:30vh; top:3vh;  right:3vw; }        /* top right polaroid   */
    .h { width:20vw;height:24vh; top:36vh; left:12vw; }        /* mid left small pol   */
    .i { width:24vw;height:38vh; top:14vh; right:4vw; }        /* right portrait       */

    /* ── big decorative text (Fleurs d'Amour style) ── */
    #bigtext {
      position:absolute;
      bottom:11vh; left:1vw;
      font-family:'Playfair Display',serif;
      font-size:clamp(48px,8vw,100px);
      font-weight:700;
      font-style:italic;
      color:#2a1f14;
      line-height:1;
      pointer-events:none;
      z-index:6;
      will-change:transform;
      opacity:.88;
      letter-spacing:-2px;
    }

    /* ── handwritten stickers ── */
    .stk {
      position:absolute;
      font-family:'Caveat',cursive;
      font-weight:700;
      pointer-events:none;
      line-height:1.2;
      z-index:2;
    }

    /* ── floating icons ── */
    .fi {
      position:absolute;
      font-size:18px;
      pointer-events:none;
      z-index:9;
      animation:flt 5s ease-in-out infinite;
    }
    @keyframes flt {
      0%,100%{ transform:translateY(0) rotate(0deg); }
      50%    { transform:translateY(-10px) rotate(8deg); }
    }

    /* ══ VEIL (dark fade for scroll reveal) ══ */
    #veil {
      position:fixed;inset:0;
      background:#0a0806;
      opacity:0;z-index:10;
      pointer-events:none;
      will-change:opacity;
    }

    /* ══ NAME ══ */
    #nameWrap {
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-52%);
      z-index:11;text-align:center;
      pointer-events:none;
      line-height:0.86;
    }
    .nline { display:block;overflow:hidden; }
    .nword {
      display:inline-block;
      font-family:'Playfair Display',serif;
      font-weight:700;
      font-size:clamp(82px,14vw,162px);
      color:#f2e8d8;
      letter-spacing:-3px;
      transform:translateY(112%);
      will-change:transform;
    }

    /* ══ PHRASE ══ */
    #phrase {
      position:fixed;
      bottom:9%;left:50%;
      transform:translateX(-50%) translateY(28px);
      z-index:11;text-align:center;
      opacity:0;pointer-events:none;
      width:min(840px,90vw);
      will-change:opacity,transform;
    }
    .ph-age {
      font-size:10px;font-weight:600;
      letter-spacing:5px;text-transform:uppercase;
      color:#c9a96e;margin-bottom:20px;
    }
    .ph-text {
      font-family:'Playfair Display',serif;
      font-size:clamp(23px,3.7vw,44px);
      font-weight:700;font-style:italic;
      color:#f2e8d8;line-height:1.4;
    }
    .ph-text em { color:#c9a96e;font-style:normal; }

    /* ══ SCROLL HINT ══ */
    #hint {
      position:fixed;bottom:22px;left:50%;
      transform:translateX(-50%);z-index:20;
      display:flex;flex-direction:column;align-items:center;gap:8px;
    }
    #hint .ln { width:1px;height:36px;background:linear-gradient(to bottom,rgba(42,31,20,.5),transparent);animation:lp 2s ease-in-out infinite; }
    #hint .tx { font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(42,31,20,.35); }
    @keyframes lp { 0%,100%{opacity:.3}50%{opacity:1} }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="curR"></div>

<!-- ══ COLLAGE BOARD ══ -->
<div id="board">

  <!-- LAYER 0 — back, depth 0.15 -->
  <div class="ph a" data-depth="0.15" data-rot="rotate(2deg)" style="transform:rotate(2deg);">
    <img src="images/ARIRANG TOUR.jpeg" style="object-position:center 50%;"/>
    <div class="stk" style="bottom:10px;left:14px;font-size:18px;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.6);transform:rotate(-1deg);">k-pop is life 🎵</div>
  </div>

  <div class="ph b" data-depth="0.15" data-rot="rotate(-1.5deg)" style="transform:rotate(-1.5deg);">
    <img src="images/IMG_1774.JPG" style="object-position:center 55%;"/>
    <div class="stk" style="bottom:10px;left:14px;font-size:19px;color:#f2e8d8;text-shadow:0 2px 6px rgba(0,0,0,.5);transform:rotate(1deg);">melbourne nights 🌙</div>
  </div>

  <!-- LAYER 1 — mid-back, depth 0.35 -->
  <div class="ph c" data-depth="0.35" data-rot="rotate(-6deg)" style="transform:rotate(-6deg);">
    <img src="images/IMG_1693.JPG" style="object-position:center 12%;"/>
  </div>

  <div class="ph d" data-depth="0.35" data-rot="rotate(3deg)" style="transform:rotate(3deg);">
    <img src="images/IMG_2337.JPG" style="object-position:center 25%;"/>
    <div class="stk" style="top:10px;right:10px;font-size:14px;color:#fff;text-shadow:0 2px 5px rgba(0,0,0,.5);">take me there ✈️</div>
  </div>

  <!-- LAYER 2 — mid (depth 0.55) -->
  <div class="ph e" data-depth="0.55" data-rot="rotate(-2deg)" style="transform:rotate(-2deg);">
    <img src="images/IMG_2095.JPG" style="object-position:center 38%;"/>
  </div>

  <div class="ph f pol" data-depth="0.55" data-rot="rotate(5deg)" style="transform:rotate(5deg);">
    <img src="images/reading with music _.jpeg" style="object-position:center 35%;"/>
    <div class="stk" style="bottom:-16px;left:0;right:0;text-align:center;font-size:13px;color:#2a1f14;">currently reading 📖</div>
  </div>

  <!-- LAYER 3 — front (depth 0.85) -->
  <div class="ph g pol" data-depth="0.85" data-rot="rotate(-7deg)" style="transform:rotate(-7deg);">
    <img src="images/IMG_1910.JPG" style="object-position:center 14%;"/>
  </div>

  <div class="ph h pol" data-depth="0.85" data-rot="rotate(6deg)" style="transform:rotate(6deg);">
    <img src="images/IMG_1694.JPG"/>
  </div>

  <div class="ph i" data-depth="0.85" data-rot="rotate(4deg)" style="transform:rotate(4deg);">
    <img src="images/IMG_1954.jpg" style="object-position:center 12%;"/>
  </div>

  <!-- big decorative text — like "Fleurs d'Amour" -->
  <div id="bigtext" data-depth="0.45" data-rot="rotate(0deg)" style="transform:rotate(0deg);">
    vision board.
  </div>

  <!-- floating icons -->
  <div class="fi" style="top:16%;left:22%;animation-delay:0s;">🎶</div>
  <div class="fi" style="bottom:26%;right:18%;animation-delay:1.3s;animation-duration:6s;">📚</div>
  <div class="fi" style="top:50%;left:7%;animation-delay:0.8s;animation-duration:7s;font-size:14px;">♪</div>
  <div class="fi" style="top:8%;left:58%;animation-delay:2s;animation-duration:5.5s;">🎧</div>
  <div class="fi" style="bottom:38%;left:46%;animation-delay:2.4s;font-size:13px;">✦</div>

</div>

<!-- veil -->
<div id="veil"></div>

<!-- name -->
<div id="nameWrap">
  <span class="nline"><span class="nword" id="wR">Riya</span></span>
  <span class="nline"><span class="nword" id="wV">Virdi</span></span>
</div>

<!-- phrase -->
<div id="phrase">
  <div class="ph-age">19 &nbsp;·&nbsp; Melbourne, Australia</div>
  <p class="ph-text">
    melbourne girl with a whole world<br/>
    on her vision board —<br/>
    <em>somewhere between figuring it out<br/>and having it all planned</em>
  </p>
</div>

<!-- scroll hint -->
<div id="hint">
  <div class="ln"></div>
  <div class="tx">scroll</div>
</div>

<script>
  /* ── cursor ── */
  const cur=document.getElementById('cur'),curR=document.getElementById('curR');
  document.addEventListener('mousemove',e=>{
    cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
    curR.style.left=e.clientX+'px';curR.style.top=e.clientY+'px';
  });

  /* ── elements ── */
  const board=document.getElementById('board');
  const veil=document.getElementById('veil');
  const wR=document.getElementById('wR');
  const wV=document.getElementById('wV');
  const phrase=document.getElementById('phrase');
  const hint=document.getElementById('hint');
  const photos=[...document.querySelectorAll('[data-depth]')];

  /* ── virtual scroll ── */
  let tY=0,cY=0;
  const MAX=window.innerHeight*2.2;
  window.addEventListener('wheel',e=>{
    e.preventDefault();
    tY=Math.max(0,Math.min(MAX,tY+e.deltaY*.88));
  },{passive:false});
  let ty0=0;
  window.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchmove',e=>{
    e.preventDefault();
    const d=ty0-e.touches[0].clientY;ty0=e.touches[0].clientY;
    tY=Math.max(0,Math.min(MAX,tY+d*1.8));
  },{passive:false});

  /* ── mouse parallax ── */
  let tmx=0,tmy=0,pmx=0,pmy=0;
  document.addEventListener('mousemove',e=>{
    tmx=e.clientX/window.innerWidth-.5;
    tmy=e.clientY/window.innerHeight-.5;
  });

  /* ── helpers ── */
  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lr=(a,b,t)=>a+(b-a)*t;
  const eo=t=>1-Math.pow(1-t,3);
  const pg=(y,s,e)=>cl((y-s)/(e-s),0,1);

  /* ── main loop ── */
  function tick(){
    /* smooth mouse */
    pmx=lr(pmx,tmx,.055);
    pmy=lr(pmy,tmy,.055);

    /* 3D parallax on each photo */
    photos.forEach(el=>{
      const depth=parseFloat(el.dataset.depth);
      const rot=el.dataset.rot||'rotate(0deg)';
      const tx=(pmx*depth*55).toFixed(2);
      const ty=(pmy*depth*38).toFixed(2);
      el.style.transform=`${rot} translate(${tx}px,${ty}px)`;
    });

    /* scroll animation */
    cY=lr(cY,tY,.072);
    const y=cY,vh=window.innerHeight;

    const cP=eo(pg(y,vh*.12,vh*.95));
    board.style.filter=`blur(${(cP*22).toFixed(1)}px)`;
    board.style.opacity=(1-cP*.5).toFixed(3);
    veil.style.opacity=(cP*.92).toFixed(3);

    const rP=eo(pg(y,vh*.32,vh*.75));
    wR.style.transform=`translateY(${((1-rP)*112).toFixed(1)}%)`;

    const vP=eo(pg(y,vh*.48,vh*.90));
    wV.style.transform=`translateY(${((1-vP)*112).toFixed(1)}%)`;

    const pP=eo(pg(y,vh*1.15,vh*1.65));
    phrase.style.opacity=pP.toFixed(3);
    phrase.style.transform=`translateX(-50%) translateY(${((1-pP)*26).toFixed(1)}px)`;

    hint.style.opacity=(1-pg(y,0,vh*.2)).toFixed(3);

    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
