<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dance with me 🐱</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    html { scroll-behavior:smooth; }
    body {
      background:#000;
      overflow:hidden;
      cursor:none;
      font-family:'DM Sans',sans-serif;
    }

    /* cursor */
    #cur {
      position:fixed; z-index:9999;
      width:12px; height:12px;
      background:#fff; border-radius:50%;
      pointer-events:none;
      transform:translate(-50%,-50%);
      mix-blend-mode:difference;
      transition:transform .1s;
    }

    /* ════════════════════════
       SCREEN 1 — LANDING
    ════════════════════════ */
    #landing {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px;
      z-index:20;
      transition:opacity .45s ease, transform .45s ease;
    }

    /* confetti particles (created in JS) */
    .confetti {
      position:absolute;
      width:8px; height:8px;
      border-radius:2px;
      pointer-events:none;
      opacity:0;
    }

    /* twinkling stars */
    .star {
      position:absolute;
      width:3px; height:3px;
      background:#fff; border-radius:50%;
      opacity:0;
      animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes twinkle {
      0%,100%{ opacity:0; } 50%{ opacity:.55; }
    }

    /* welcome line */
    #welcome {
      font-family:'Caveat',cursive;
      font-size:clamp(20px,3vw,36px);
      font-weight:700;
      color:rgba(255,255,255,.55);
      text-align:center;
      letter-spacing:.5px;
    }

    /* main phrase */
    #phrase {
      font-family:'Caveat',cursive;
      font-size:clamp(40px,8vw,100px);
      font-weight:700;
      color:#fff;
      text-align:center;
      line-height:1.1;
      padding:0 20px;
      user-select:none;
    }
    .word {
      display:inline-block;
      transition:transform .18s cubic-bezier(.34,1.56,.64,1), color .18s;
      cursor:none;
    }
    .word:hover { transform:rotate(-5deg) scale(1.12); color:#ffda79; }
    .word:nth-child(even):hover { transform:rotate(5deg) scale(1.12); }

    /* rings */
    .ring {
      position:absolute;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.06);
      pointer-events:none;
      animation:pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {
      0%,100%{ transform:scale(1); opacity:.4; }
      50%    { transform:scale(1.04); opacity:.9; }
    }

    /* hint */
    #hint {
      font-size:11px;
      font-weight:500;
      letter-spacing:4px;
      text-transform:uppercase;
      color:rgba(255,255,255,.75);
      margin-top:8px;
      animation:pulse-hint 2s ease-in-out infinite;
    }
    @keyframes pulse-hint { 0%,100%{opacity:.6} 50%{opacity:1} }

    /* landing exit */
    #landing.out {
      opacity:0;
      transform:scale(1.1);
      pointer-events:none;
    }

    /* ════════════════════════
       SCREEN 2 — DANCE
    ════════════════════════ */
    #dance {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#000;
      z-index:10;
      clip-path:circle(0% at 50% 50%);
      transition:clip-path .75s cubic-bezier(.4,0,.2,1);
    }
    #dance.open { clip-path:circle(150% at 50% 50%); }

    /* purple glow */
    .glow {
      position:absolute;
      width:500px; height:500px;
      border-radius:50%;
      background:radial-gradient(circle,rgba(130,60,255,.28) 0%,transparent 68%);
      animation:glow-pulse 2s ease-in-out infinite;
      pointer-events:none; z-index:0;
    }
    @keyframes glow-pulse {
      0%,100%{ transform:scale(1); opacity:.6; }
      50%    { transform:scale(1.15); opacity:1; }
    }

    .dance-label {
      font-family:'Caveat',cursive;
      font-size:clamp(22px,3.5vw,48px);
      font-weight:700;
      color:#fff;
      text-align:center;
      position:relative; z-index:5;
      animation:label-in .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    .dance-label.top { margin-bottom:18px; animation-delay:.2s; }
    .dance-label.bot { margin-top:18px; animation-delay:.45s; color:#ffda79; }
    @keyframes label-in {
      from{ opacity:0; transform:translateY(22px); }
      to  { opacity:1; transform:translateY(0); }
    }

    /* yt wrapper — hue-shift green → purple, crop to cat */
    #yt-wrap {
      position:relative; z-index:4;
      width:clamp(260px,38vw,480px);
      aspect-ratio:1/1;
      overflow:hidden;
      border-radius:20px;
    }
    #yt-wrap iframe {
      width:200%;
      height:200%;
      margin-left:-50%;
      margin-top:-38%;
      border:none;
      display:block;
      /* shift green bg → dark purple so cat pops on black */
      filter:hue-rotate(155deg) saturate(1.6) brightness(.95);
      pointer-events:none;
    }

    /* floating notes */
    .note {
      position:absolute;
      font-size:26px;
      pointer-events:none; z-index:6;
      animation:note-float var(--nd,4s) ease-in-out infinite var(--ndelay,0s);
    }
    @keyframes note-float {
      0%  { transform:translateY(0) rotate(0deg); opacity:.45; }
      50% { transform:translateY(-30px) rotate(15deg); opacity:1; }
      100%{ transform:translateY(0) rotate(0deg); opacity:.45; }
    }

    /* "there's more" nudge */
    #nudge {
      position:fixed; bottom:32px; left:50%;
      transform:translateX(-50%);
      z-index:30;
      text-align:center;
      opacity:0;
      pointer-events:none;
      transition:opacity .7s ease;
    }
    #nudge.show { opacity:1; pointer-events:auto; cursor:none; }
    #nudge p {
      font-family:'Caveat',cursive;
      font-size:clamp(18px,2.8vw,32px);
      font-weight:700;
      color:#fff;
      line-height:1.3;
    }
    #nudge em {
      font-style:normal;
      color:#ffda79;
      display:block;
    }
    #nudge .arr {
      font-size:20px;
      display:block;
      margin-top:6px;
      animation:bounce-arr 1.2s ease-in-out infinite;
    }
    @keyframes bounce-arr {
      0%,100%{ transform:translateY(0); }
      50%    { transform:translateY(7px); }
    }

    /* ════════════════════════
       SCREEN 3 — PORTFOLIO
    ════════════════════════ */
    #portfolio {
      position:relative;
      min-height:100vh;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:#000;
      z-index:1;
      padding:80px 24px;
      /* hidden until unlocked */
      display:none;
    }
    #portfolio h2 {
      font-family:'Caveat',cursive;
      font-size:clamp(38px,7vw,90px);
      color:#fff; text-align:center;
      margin-bottom:16px;
    }
    #portfolio p {
      color:rgba(255,255,255,.45);
      font-size:clamp(14px,1.8vw,18px);
      text-align:center;
      max-width:500px;
      line-height:1.7;
    }
  </style>
</head>
<body>

<div id="cur"></div>

<!-- ═══ SCREEN 1: LANDING ═══ -->
<div id="landing">
  <div class="ring" style="width:min(55vw,380px);height:min(55vw,380px);animation-delay:0s;"></div>
  <div class="ring" style="width:min(75vw,520px);height:min(75vw,520px);animation-delay:.9s;animation-duration:3.5s;"></div>

  <p id="welcome">hi welcome, let's dance! 🎉</p>
  <div id="phrase"></div>
  <p id="hint">click anywhere</p>
</div>

<!-- ═══ SCREEN 2: DANCE ═══ -->
<div id="dance">
  <div class="glow"></div>

  <p class="dance-label top">you asked for it!! 🕺</p>

  <div id="yt-wrap">
    <iframe id="yt"
      allow="autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <p class="dance-label bot">we're dancing now 😻</p>

  <div class="note" style="top:10%;left:7%;  --nd:3.5s;--ndelay:0s;">🎵</div>
  <div class="note" style="top:7%; right:9%; --nd:4.2s;--ndelay:.5s;">🎶</div>
  <div class="note" style="bottom:16%;left:5%;--nd:5s; --ndelay:.2s;">🎸</div>
  <div class="note" style="bottom:12%;right:7%;--nd:3.8s;--ndelay:.9s;">🎹</div>
  <div class="note" style="top:42%;left:3%; --nd:4.6s;--ndelay:.4s;font-size:20px;">♪</div>
  <div class="note" style="top:38%;right:4%;--nd:3.2s;--ndelay:.7s;font-size:20px;">♫</div>
  <div class="note" style="bottom:35%;left:20%;--nd:5s;--ndelay:1s;font-size:14px;">✦</div>
  <div class="note" style="bottom:32%;right:20%;--nd:4s;--ndelay:.3s;font-size:14px;">✦</div>
</div>

<!-- "there's more to me" nudge -->
<div id="nudge" onclick="goPortfolio()">
  <p>enjoyed? wait —<em>there's more to me ✨</em></p>
  <span class="arr">↓ scroll down ↓</span>
</div>

<!-- ═══ SCREEN 3: PORTFOLIO ═══ -->
<div id="portfolio">
  <h2>there's more to me 🌙</h2>
  <p>portfolio coming soon — watch this space.</p>
</div>

<script>
  /* cursor */
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });

  /* build phrase */
  const words = ['click', 'here', 'to', 'dance', 'with', 'me'];
  const phraseEl = document.getElementById('phrase');
  words.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'word';
    s.textContent = w;
    phraseEl.appendChild(s);
    if (i < words.length - 1) phraseEl.appendChild(document.createTextNode(' '));
  });

  /* stars */
  const landing = document.getElementById('landing');
  for (let i = 0; i < 65; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*3}s;--delay:${Math.random()*3}s;`;
    landing.appendChild(s);
  }

  /* confetti burst on click */
  const COLORS = ['#ffda79','#ff79c6','#a29bfe','#74b9ff','#55efc4','#fd79a8','#fff'];
  function burst(x, y) {
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      el.style.background = COLORS[Math.floor(Math.random()*COLORS.length)];
      el.style.left = x + 'px';
      el.style.top  = y + 'px';
      el.style.position = 'fixed';
      el.style.zIndex = '9000';
      el.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
      document.body.appendChild(el);

      const angle = Math.random() * Math.PI * 2;
      const dist  = 80 + Math.random() * 220;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist;
      const rot = (Math.random() - .5) * 720;
      const dur = 500 + Math.random() * 500;

      el.animate([
        { opacity:1, transform:`translate(0,0) rotate(0deg) scale(1)` },
        { opacity:0, transform:`translate(${tx}px,${ty}px) rotate(${rot}deg) scale(0)` }
      ], { duration:dur, easing:'cubic-bezier(.2,.8,.5,1)', fill:'forwards' });

      setTimeout(() => el.remove(), dur + 50);
    }
  }

  /* click */
  const dance  = document.getElementById('dance');
  const nudge  = document.getElementById('nudge');
  const ytEl   = document.getElementById('yt');
  let clicked  = false;

  landing.addEventListener('click', e => {
    if (clicked) return;
    clicked = true;

    burst(e.clientX, e.clientY);

    setTimeout(() => {
      landing.classList.add('out');
    }, 80);

    setTimeout(() => {
      landing.style.display = 'none';

      /* load yt AFTER user interaction so autoplay+sound works */
      ytEl.src = 'https://www.youtube.com/embed/hrQzECgGiP0?autoplay=1&loop=1&playlist=hrQzECgGiP0&controls=0&modestbranding=1&rel=0&playsinline=1&mute=0';

      dance.style.zIndex = '15';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        dance.classList.add('open');
      }));
    }, 480);

    /* nudge after 6s */
    setTimeout(() => nudge.classList.add('show'), 6000);
  });

  /* go to portfolio */
  function goPortfolio() {
    const port = document.getElementById('portfolio');
    port.style.display = 'flex';
    document.body.style.overflow = 'auto';

    dance.style.transition = 'opacity .5s, transform .5s';
    dance.style.opacity = '0';
    dance.style.transform = 'translateY(-30px)';
    dance.style.pointerEvents = 'none';

    nudge.style.opacity = '0';
    nudge.style.pointerEvents = 'none';

    setTimeout(() => {
      dance.style.display = 'none';
      port.scrollIntoView({ behavior:'smooth' });
    }, 400);
  }
</script>
</body>
</html>
