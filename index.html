<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riya Virdi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Caveat:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#0e0c0a;
      font-family:'DM Sans',sans-serif;
      cursor:none;
    }

    #cur  { position:fixed;width:9px;height:9px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference; }
    #curR { position:fixed;width:30px;height:30px;border:1px solid rgba(201,169,110,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .08s,top .08s; }

    /* ═══════════════════════════════════════
       COLLAGE  —  exact Summer Nights layout
       Irregular mosaic grid, zero gaps, no outlines
    ═══════════════════════════════════════ */
    #collage {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-columns: 22fr 24fr 26fr 28fr;
      grid-template-rows:    42fr 30fr 28fr;
      gap: 0;
      will-change: filter, opacity;
    }

    /* grid cell base */
    .gi {
      overflow: hidden;
      position: relative;
    }
    .gi img {
      width:100%; height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    /* grid placements */
    .g1 { grid-column:1;     grid-row:1/3;   }   /* tall portrait, left side  */
    .g2 { grid-column:2/5;   grid-row:1;     }   /* wide concert, top         */
    .g3 { grid-column:4;     grid-row:2/4;   }   /* tall portrait, right side */
    .g4 { grid-column:2;     grid-row:2;     }
    .g5 { grid-column:3;     grid-row:2;     }
    .g6 { grid-column:1/3;   grid-row:3;     }   /* wide landscape, btm left  */
    .g7 { grid-column:3;     grid-row:3;     }

    /* sticker labels ON photos (like Summer Nights text stickers) */
    .lbl {
      position:absolute;
      font-family:'Caveat',cursive;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.55);
      pointer-events:none;
      line-height:1.15;
    }
    .lbl.box {
      background:rgba(240,232,215,.92);
      color:#1a1208;
      text-shadow:none;
      padding:6px 12px 8px;
    }

    /* ── floating polaroid accents on top ── */
    .acc {
      position:fixed;
      background:#fff;
      padding:5px 5px 18px;
      box-shadow:0 6px 24px rgba(0,0,0,.38);
      z-index:6;
      overflow:hidden;
    }
    .acc img {
      width:100%;height:100%;
      object-fit:cover;display:block;
    }

    /* ── floating music / book icons ── */
    .fi {
      position:fixed;font-size:20px;
      pointer-events:none;z-index:7;
      animation:flt 5s ease-in-out infinite;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));
    }
    @keyframes flt {
      0%,100%{ transform:translateY(0) rotate(0deg); }
      50%    { transform:translateY(-10px) rotate(7deg); }
    }

    /* ══ VEIL ══ */
    #veil {
      position:fixed;inset:0;
      background:#0a0806;
      opacity:0;z-index:10;
      pointer-events:none;
      will-change:opacity;
    }

    /* ══ NAME ══ */
    #nameWrap {
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-52%);
      z-index:11;text-align:center;
      pointer-events:none;
      line-height:0.86;
    }
    .nline { display:block;overflow:hidden; }
    .nword {
      display:inline-block;
      font-family:'Playfair Display',serif;
      font-weight:700;
      font-size:clamp(80px,14vw,160px);
      color:#f2e8d8;
      letter-spacing:-3px;
      transform:translateY(112%);
      will-change:transform;
    }

    /* ══ PHRASE ══ */
    #phrase {
      position:fixed;
      bottom:9%;left:50%;
      transform:translateX(-50%) translateY(28px);
      z-index:11;text-align:center;
      opacity:0;pointer-events:none;
      width:min(840px,90vw);
      will-change:opacity,transform;
    }
    .ph-age {
      font-size:10px;font-weight:600;
      letter-spacing:5px;text-transform:uppercase;
      color:#c9a96e;margin-bottom:20px;
    }
    .ph-text {
      font-family:'Playfair Display',serif;
      font-size:clamp(23px,3.7vw,44px);
      font-weight:700;font-style:italic;
      color:#f2e8d8;line-height:1.4;
    }
    .ph-text em { color:#c9a96e;font-style:normal; }

    /* ══ SCROLL HINT ══ */
    #hint {
      position:fixed;bottom:22px;left:50%;
      transform:translateX(-50%);z-index:20;
      display:flex;flex-direction:column;align-items:center;gap:8px;
    }
    #hint .ln { width:1px;height:36px;background:linear-gradient(to bottom,rgba(200,180,140,.7),transparent);animation:lp 2s ease-in-out infinite; }
    #hint .tx { font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(200,180,140,.45); }
    @keyframes lp { 0%,100%{opacity:.3}50%{opacity:1} }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="curR"></div>

<!-- ══ COLLAGE — Summer Nights layout with Riya's photos ══ -->
<div id="collage">

  <!-- g1: tall portrait, full left -->
  <div class="gi g1">
    <img src="images/IMG_1693.JPG" style="object-position:center 10%;"/>
  </div>

  <!-- g2: wide top strip — Melbourne park/street -->
  <div class="gi g2">
    <img src="images/IMG_2026.JPG" style="object-position:center 35%;"/>
    <div class="lbl box" style="bottom:16px;left:20px;font-size:22px;transform:rotate(-1deg);">melbourne days. ☀️</div>
  </div>

  <!-- g3: tall portrait, full right -->
  <div class="gi g3">
    <img src="images/IMG_1954.jpg" style="object-position:center 10%;"/>
  </div>

  <!-- g4: mid left — book + music -->
  <div class="gi g4">
    <img src="images/reading with music _.jpeg" style="object-position:center 30%;"/>
    <div class="lbl" style="bottom:12px;left:12px;font-size:16px;">currently reading 📖</div>
  </div>

  <!-- g5: mid centre — Riya best portrait -->
  <div class="gi g5">
    <img src="images/IMG_2095.JPG" style="object-position:center 40%;"/>
    <div class="lbl" style="top:12px;right:12px;font-size:15px;">good times 🤍</div>
  </div>

  <!-- g6: wide landscape bottom left — fairy lights -->
  <div class="gi g6">
    <img src="images/IMG_1774.JPG" style="object-position:center 55%;"/>
    <div class="lbl box" style="bottom:14px;left:16px;font-size:20px;transform:rotate(-1deg);">melbourne nights. 🌙</div>
  </div>

  <!-- g7: bottom right — like the pizza/memories shot -->
  <div class="gi g7">
    <img src="images/IMG_2337.JPG" style="object-position:center 25%;"/>
    <div class="lbl" style="bottom:12px;right:12px;font-size:15px;">take me there ✈️</div>
  </div>

</div>

<!-- floating polaroid accents — like the extra photos scattered in Summer Nights -->
<div class="acc" style="top:24%;left:18%;width:16vw;height:21vh;transform:rotate(-7deg);">
  <img src="images/IMG_1910.JPG" style="object-position:center 15%;"/>
</div>
<div class="acc" style="bottom:20%;left:34%;width:14vw;height:19vh;transform:rotate(6deg);">
  <img src="images/IMG_1694.JPG"/>
</div>
<div class="acc" style="top:6%;right:3%;width:13vw;height:16vh;transform:rotate(-5deg);">
  <img src="images/IMG_2335.JPG"/>
</div>

<!-- floating icons -->
<div class="fi" style="top:17%;left:24%;animation-delay:0s;">🎶</div>
<div class="fi" style="bottom:26%;right:18%;animation-delay:1.3s;animation-duration:6s;">📚</div>
<div class="fi" style="top:48%;left:7%;animation-delay:0.7s;animation-duration:7s;font-size:15px;">♪</div>
<div class="fi" style="bottom:38%;left:46%;animation-delay:2.1s;font-size:14px;">✦</div>
<div class="fi" style="top:7%;left:56%;animation-delay:1.8s;animation-duration:5.5s;">🎧</div>

<!-- veil -->
<div id="veil"></div>

<!-- name -->
<div id="nameWrap">
  <span class="nline"><span class="nword" id="wR">Riya</span></span>
  <span class="nline"><span class="nword" id="wV">Virdi</span></span>
</div>

<!-- phrase -->
<div id="phrase">
  <div class="ph-age">19 &nbsp;·&nbsp; Melbourne, Australia</div>
  <p class="ph-text">
    melbourne girl with a whole world<br/>
    on her vision board —<br/>
    <em>somewhere between figuring it out<br/>and having it all planned</em>
  </p>
</div>

<!-- scroll hint -->
<div id="hint">
  <div class="ln"></div>
  <div class="tx">scroll</div>
</div>

<script>
  const cur=document.getElementById('cur'),curR=document.getElementById('curR');
  document.addEventListener('mousemove',e=>{
    cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
    curR.style.left=e.clientX+'px';curR.style.top=e.clientY+'px';
  });

  const collage=document.getElementById('collage');
  const veil=document.getElementById('veil');
  const wR=document.getElementById('wR');
  const wV=document.getElementById('wV');
  const phrase=document.getElementById('phrase');
  const hint=document.getElementById('hint');

  let tY=0,cY=0;
  const MAX=window.innerHeight*2.2;

  window.addEventListener('wheel',e=>{
    e.preventDefault();
    tY=Math.max(0,Math.min(MAX,tY+e.deltaY*.88));
  },{passive:false});

  let ty0=0;
  window.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchmove',e=>{
    e.preventDefault();
    const d=ty0-e.touches[0].clientY;ty0=e.touches[0].clientY;
    tY=Math.max(0,Math.min(MAX,tY+d*1.8));
  },{passive:false});

  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lr=(a,b,t)=>a+(b-a)*t;
  const eo=t=>1-Math.pow(1-t,3);
  const pg=(y,s,e)=>cl((y-s)/(e-s),0,1);

  function tick(){
    cY=lr(cY,tY,.072);
    const y=cY,vh=window.innerHeight;

    const cP=eo(pg(y,vh*.12,vh*.95));
    collage.style.filter=`blur(${(cP*22).toFixed(1)}px)`;
    collage.style.opacity=(1-cP*.5).toFixed(3);
    veil.style.opacity=(cP*.92).toFixed(3);

    const rP=eo(pg(y,vh*.32,vh*.75));
    wR.style.transform=`translateY(${((1-rP)*112).toFixed(1)}%)`;

    const vP=eo(pg(y,vh*.48,vh*.90));
    wV.style.transform=`translateY(${((1-vP)*112).toFixed(1)}%)`;

    const pP=eo(pg(y,vh*1.15,vh*1.65));
    phrase.style.opacity=pP.toFixed(3);
    phrase.style.transform=`translateX(-50%) translateY(${((1-pP)*26).toFixed(1)}px)`;

    hint.style.opacity=(1-pg(y,0,vh*.2)).toFixed(3);

    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
