<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>riri's portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=DM+Sans:wght@400;500&family=Pinyon+Script&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js"></script>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:#000; overflow:hidden; cursor:none; font-family:'DM Sans',sans-serif; }

    #cur {
      position:fixed; z-index:9999; width:12px; height:12px;
      background:#fff; border-radius:50%; pointer-events:none;
      transform:translate(-50%,-50%); mix-blend-mode:difference;
    }

    /* ── LANDING ── */
    #landing {
      position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:10px; z-index:20;
      transition:opacity .45s ease, transform .45s ease;
    }
    #landing.out { opacity:0; transform:scale(1.1); pointer-events:none; }

    .star {
      position:absolute; width:3px; height:3px; background:#fff;
      border-radius:50%; opacity:0;
      animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:.55} }

    .ring {
      position:absolute; border-radius:50%;
      border:1px solid rgba(255,255,255,.07); pointer-events:none;
      animation:pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.04);opacity:.9} }

    #welcome {
      font-family:'Caveat',cursive; font-size:clamp(20px,3vw,36px);
      font-weight:700; color:rgba(255,255,255,.55); text-align:center;
    }
    #phrase {
      font-family:'Caveat',cursive; font-size:clamp(40px,8vw,100px);
      font-weight:700; color:#fff; text-align:center;
      line-height:1.1; padding:0 20px; user-select:none;
    }
    .word {
      display:inline-block; cursor:none;
      transition:transform .18s cubic-bezier(.34,1.56,.64,1), color .18s;
    }
    .word:hover { transform:rotate(-5deg) scale(1.12); color:#ffda79; }
    .word:nth-child(even):hover { transform:rotate(5deg) scale(1.12); }
    #hint {
      font-size:11px; font-weight:500; letter-spacing:4px; text-transform:uppercase;
      color:rgba(255,255,255,.8); margin-top:8px;
      animation:pulse-hint 2s ease-in-out infinite;
    }
    @keyframes pulse-hint { 0%,100%{opacity:.65} 50%{opacity:1} }
    .confetti { position:fixed; width:8px; height:8px; border-radius:2px; pointer-events:none; opacity:0; }

    /* ── DANCE SCREEN ── */
    #dance {
      position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
      background:#000; z-index:10;
      clip-path:circle(0% at 50% 50%);
      transition:clip-path .75s cubic-bezier(.4,0,.2,1);
    }
    #dance.open { clip-path:circle(150% at 50% 50%); }

    /* ── CAT ── */
    #cat-wrap {
      position:relative;
      width:clamp(340px,50vw,620px);
      aspect-ratio:1/1;
      overflow:hidden;
      border-radius:20px;
      background:#000;
      cursor:none;
    }
    @keyframes pop-in {
      0%   { transform:scale(0.4) rotate(-6deg); opacity:0; }
      65%  { transform:scale(1.06) rotate(1deg); opacity:1; }
      100% { transform:scale(1) rotate(0deg); opacity:1; }
    }
    #cat-wrap.popping { animation:pop-in .5s cubic-bezier(.34,1.56,.64,1) both; }

    #cat-vid, #cat-img {
      position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    }
    #cat-overlay { position:absolute; inset:0; z-index:3; cursor:none; }

    /* ── SEQUENCE TEXT (all hidden by default) ── */
    .seq-text {
      position:fixed; z-index:30;
      font-family:'Caveat',cursive; font-weight:700;
      opacity:0; pointer-events:none;
      transition:opacity .7s ease;
    }
    .seq-text.show { opacity:1; }

    /* 1 — below cat, centred */
    #hint-topright {
      bottom:28%; left:50%; transform:translateX(-50%);
      font-size:clamp(18px,2.5vw,30px); color:rgba(255,255,255,.8);
      white-space:nowrap; text-align:center;
    }

    /* 2 — enjoyed + look down, top right */
    #top-cta {
      top:28px; right:32px; text-align:right;
      font-size:clamp(16px,2.2vw,26px); color:#fff; line-height:1.4;
    }
    #top-cta em { font-style:normal; color:#ffda79; display:block; }
    #top-cta .look-down {
      font-size:clamp(14px,1.8vw,22px);
      color:rgba(255,255,255,.65);
      margin-top:6px; display:block;
    }

    /* 3 — scroll (no arrows), bottom centre */
    #scroll-cta {
      bottom:28px; left:50%; transform:translateX(-50%);
      font-size:clamp(18px,2.5vw,28px); color:#ffda79;
      white-space:nowrap; text-align:center; cursor:none;
    }

    /* ── PORTFOLIO / PLANE SECTION ── */
    #portfolio {
      position:fixed; inset:0;
      background:#000; z-index:8;
      display:none; align-items:center; justify-content:center;
      opacity:0; transition:opacity .6s ease;
    }
    #portfolio.visible { display:flex; }
    #portfolio.faded-in { opacity:1; }

    #flight-svg {
      position:absolute; inset:0;
      width:100%; height:100%;
      transition:opacity .8s ease;
      pointer-events:none;
    }

    #lottie-plane {
      position:fixed;
      width:1400px; height:1400px;
      pointer-events:none; z-index:9;
      opacity:0; transition:opacity .4s ease;
    }

    #after-plane {
      position:absolute; inset:0;
      opacity:0; transition:opacity 1.2s ease;
      overflow:hidden;
      background:#000;
    }
    #after-plane.show { opacity:1; }

    /* ── MOODBOARD ── */
    #collage-wrap {
      position:absolute; inset:0;
      background:#000;
      display:flex; align-items:center; justify-content:center;
    }
    #collage-img {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
      border-radius:0;
      box-shadow:
        inset 0 0 120px rgba(0,0,0,.7),
        0 0 80px rgba(0,0,0,.9);
      transform:perspective(1800px) rotateX(1.5deg) rotateY(-1deg) scale(1.01);
      transition:transform .6s ease, box-shadow .6s ease;
      filter:drop-shadow(0 0 40px rgba(0,0,0,1));
    }
    #collage-img:hover {
      transform:perspective(1800px) rotateX(0deg) rotateY(0deg) scale(1.02);
    }
  </style>
</head>
<body>

<div id="cur"></div>

<!-- LANDING -->
<div id="landing">
  <div class="ring" style="width:min(55vw,380px);height:min(55vw,380px);"></div>
  <div class="ring" style="width:min(75vw,520px);height:min(75vw,520px);animation-delay:.9s;animation-duration:3.5s;"></div>
  <p id="welcome">hi welcome! 💫</p>
  <div id="phrase"></div>
  <p id="hint">click anywhere</p>
</div>

<!-- DANCE -->
<div id="dance">
  <div id="cat-wrap">
    <video id="cat-vid" playsinline muted></video>
    <img   id="cat-img" alt="" style="display:none"/>
    <div   id="cat-overlay"></div>
  </div>
</div>

<!-- sequence text elements -->
<div id="hint-topright" class="seq-text">look top right</div>
<div id="top-cta" class="seq-text">
  <p>enjoyed? but wait —<em>there's more to me ✨</em></p>
  <span class="look-down">look down</span>
</div>
<div id="scroll-cta" class="seq-text">scroll</div>

<!-- PORTFOLIO / PLANE SECTION -->
<div id="portfolio">
  <svg id="flight-svg" xmlns="http://www.w3.org/2000/svg"
       viewBox="0 0 1440 810" preserveAspectRatio="xMidYMid slice">
    <path id="flight-path"
      d="M 55,760 C 400,760 1050,50 1385,50"
      fill="none" stroke="none" opacity="0"/>
  </svg>

  <div id="lottie-plane">
    <lottie-player src="plane.json" background="transparent" speed="1" loop autoplay></lottie-player>
  </div>

  <div id="after-plane">
    <div id="collage-wrap">
      <img id="collage-img" src="images/collage.png" alt="riya virdi collage">
    </div>
  </div>
</div>

<!-- audio-only YouTube, hidden off-screen -->
<iframe id="yt-audio"
  style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;pointer-events:none;"
  allow="autoplay; encrypted-media">
</iframe>

<script>
  /* cursor */
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px'; cur.style.top = e.clientY + 'px';
  });

  /* landing phrase */
  const words = ['click','here','to','dance','with','me'];
  const phraseEl = document.getElementById('phrase');
  words.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'word'; s.textContent = w;
    phraseEl.appendChild(s);
    if (i < words.length-1) phraseEl.appendChild(document.createTextNode(' '));
  });

  /* stars */
  const landing = document.getElementById('landing');
  for (let i = 0; i < 65; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*3}s;--delay:${Math.random()*3}s;`;
    landing.appendChild(s);
  }

  /* confetti */
  const COLS = ['#ffda79','#ff79c6','#a29bfe','#74b9ff','#55efc4','#fd79a8','#fff'];
  function burst(x, y) {
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div'); el.className = 'confetti';
      el.style.cssText = `background:${COLS[Math.floor(Math.random()*COLS.length)]};left:${x}px;top:${y}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
      document.body.appendChild(el);
      const a = Math.random()*Math.PI*2, d = 80+Math.random()*220;
      el.animate([
        {opacity:1,transform:'translate(0,0) rotate(0deg) scale(1)'},
        {opacity:0,transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) rotate(${(Math.random()-.5)*720}deg) scale(0)`}
      ], {duration:500+Math.random()*500, easing:'cubic-bezier(.2,.8,.5,1)', fill:'forwards'});
      setTimeout(() => el.remove(), 600);
    }
  }

  /* refs */
  const catWrap     = document.getElementById('cat-wrap');
  const catVid      = document.getElementById('cat-vid');
  const catImg      = document.getElementById('cat-img');
  const catOverlay  = document.getElementById('cat-overlay');
  const ytAudio     = document.getElementById('yt-audio');
  const dance       = document.getElementById('dance');
  const hintTR    = document.getElementById('hint-topright');
  const topCta    = document.getElementById('top-cta');
  const scrollCta = document.getElementById('scroll-cta');

  const MP4_SRC   = 'https://media1.tenor.com/m/Rd0jrWH5JjgAAAAd/cat-scuba.mp4';
  const GIF_SRC   = 'https://media1.tenor.com/m/Rd0jrWH5JjgAAAAd/cat-scuba.gif';
  const GIF_MS    = 10100; // GIF loop duration fallback
  const AUDIO_SRC = 'https://www.youtube.com/embed/hrQzECgGiP0?autoplay=1&mute=0&controls=0&rel=0&playsinline=1&disablekb=1&fs=0&iv_load_policy=3&modestbranding=1';

  let timers = [];

  function clearSeq() {
    timers.forEach(clearTimeout); timers = [];
    [hintTR, topCta, scrollCta].forEach(el => el.classList.remove('show'));
  }

  /* sequence after cat finishes — each step visible for ~5s */
  function runSequence() {
    clearSeq();
    const t = id => timers.push(id);
    t(setTimeout(() => hintTR.classList.add('show'),    300));   // "look top right"
    t(setTimeout(() => hintTR.classList.remove('show'), 5300));  // fades after 5s
    t(setTimeout(() => topCta.classList.add('show'),    6000));  // "enjoyed?" + "look down" together
    t(setTimeout(() => topCta.classList.remove('show'), 11000)); // fades after 5s
    t(setTimeout(() => scrollCta.classList.add('show'), 11700)); // "scroll"
  }

  /* start or restart video + audio */
  function startDance() {
    /* try MP4 first (plays once, fires ended); fallback to GIF + timer */
    catVid.style.display = 'block';
    catImg.style.display  = 'none';
    ytAudio.src = AUDIO_SRC;

    catVid.src = MP4_SRC;
    catVid.load();
    const playPromise = catVid.play();

    if (playPromise !== undefined) {
      playPromise.catch(() => {
        /* MP4 failed — use GIF + 10.1s timer */
        catVid.style.display = 'none';
        catImg.style.display  = 'block';
        catImg.src = '';
        catImg.src = GIF_SRC;
        timers.push(setTimeout(runSequence, GIF_MS));
      });
    }
  }

  /* video ended → run text sequence */
  catVid.addEventListener('ended', runSequence);

  /* click cat → pop + replay; 3rd click fast-forwards to scroll */
  let catClicks = 0;
  catOverlay.addEventListener('click', () => {
    catClicks++;
    if (catClicks >= 3) {
      clearSeq();
      scrollCta.classList.add('show');
      return;
    }
    clearSeq();
    catWrap.classList.remove('popping');
    void catWrap.offsetWidth;
    catWrap.classList.add('popping');
    catWrap.addEventListener('animationend', () => {
      catWrap.classList.remove('popping');
      startDance();
    }, {once: true});
  });

  /* ── PORTFOLIO / PLANE ANIMATION ── */
  const portfolio   = document.getElementById('portfolio');
  const flightSvg   = document.getElementById('flight-svg');
  const flightPath  = document.getElementById('flight-path');
  const lottiePlane = document.getElementById('lottie-plane');
  const afterPlane  = document.getElementById('after-plane');
  let planeShown    = false;
  let animActive    = false;

  function svgToScreen(svgX, svgY) {
    const pt = flightSvg.createSVGPoint();
    pt.x = svgX; pt.y = svgY;
    return pt.matrixTransform(flightSvg.getScreenCTM());
  }

  function showPortfolio() {
    if (planeShown) return; planeShown = true;
    ytAudio.src = '';
    catVid.pause();
    [dance, hintTR, topCta, scrollCta].forEach(el => {
      el.style.transition = 'opacity .5s'; el.style.opacity = '0';
    });
    portfolio.classList.add('visible');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      portfolio.classList.add('faded-in');
      startPlaneAnim();
    }));
  }

  function hidePortfolio() {
    animActive = false;
    portfolio.classList.remove('faded-in');
    [dance, hintTR, topCta, scrollCta].forEach(el => {
      el.style.transition = 'opacity .5s'; el.style.opacity = '';
    });
    setTimeout(() => {
      portfolio.classList.remove('visible');
      lottiePlane.style.opacity = '0';
      lottiePlane.style.transform = '';
      flightSvg.style.opacity = '1';
      afterPlane.classList.remove('show');
      planeShown = false;
    }, 700);
  }

  function goBackToLanding() {
    clearSeq();
    catVid.src = ''; catVid.load();
    ytAudio.src = '';
    dance.style.transition = 'opacity .5s'; dance.style.opacity = '0';
    setTimeout(() => {
      dance.classList.remove('open');
      dance.style.transition = ''; dance.style.opacity = ''; dance.style.zIndex = '10';
      landing.style.display = '';
      catWrap.classList.remove('popping');
      catClicks = 0;
      clicked = false;
    }, 500);
  }

  function startPlaneAnim() {
    const totalLen = flightPath.getTotalLength();
    animActive = true;

    setTimeout(() => {
      if (!animActive) return;
      lottiePlane.style.opacity = '1';
      const start = performance.now();
      const dur   = 4200;

      (function frame(now) {
        if (!animActive) return;
        const t      = Math.min((now - start) / dur, 1);
        const eased  = t < .5 ? 2*t*t : -1+(4-2*t)*t;
        const dist   = eased * totalLen;
        const pt     = flightPath.getPointAtLength(dist);
        const ptNext = flightPath.getPointAtLength(Math.min(dist + 10, totalLen));
        const angle  = Math.atan2(ptNext.y - pt.y, ptNext.x - pt.x) * 180 / Math.PI;
        const sc     = svgToScreen(pt.x, pt.y);
        lottiePlane.style.left = sc.x + 'px';
        lottiePlane.style.top  = sc.y + 'px';
        lottiePlane.style.transform = `translate(-50%,-50%) rotate(${angle}deg)`;
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          flightSvg.style.opacity  = '0';
          lottiePlane.style.opacity = '0';
          setTimeout(() => afterPlane.classList.add('show'), 900);
        }
      })(start);
    }, 600);
  }

  /* scroll triggers — down to go forward, up to go back */
  scrollCta.addEventListener('click', showPortfolio);
  window.addEventListener('wheel', e => {
    if (planeShown && e.deltaY < 0)                                      { hidePortfolio(); return; }
    if (!planeShown && dance.classList.contains('open') && e.deltaY < 0) { goBackToLanding(); return; }
    if (scrollCta.classList.contains('show') && e.deltaY > 0)            { showPortfolio(); }
  }, { passive:true });

  /* landing click */
  let clicked = false;
  landing.addEventListener('click', e => {
    if (clicked) return; clicked = true;
    startDance(); /* synchronous → audio autoplay allowed */
    burst(e.clientX, e.clientY);
    setTimeout(() => {
      landing.style.display = 'none';
      dance.style.zIndex = '15';
      requestAnimationFrame(() => requestAnimationFrame(() => dance.classList.add('open')));
    }, 480);
  });
</script>
</body>
</html>
