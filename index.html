<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riya Virdi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Caveat:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background:#0e0c0a;
      font-family:'DM Sans',sans-serif;
      cursor:none;
    }

    #cur  { position:fixed;width:9px;height:9px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:difference; }
    #curR { position:fixed;width:30px;height:30px;border:1px solid rgba(201,169,110,.5);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .08s,top .08s; }

    /* ════════════════════════════════════════════
       COLLAGE
       5-column mosaic, Summer Nights structure:
       - col1: full-height portrait (like dancing girl)
       - col3: DOMINANT full-height centre (like reading girl)
       - everything fills in around those two anchors
    ════════════════════════════════════════════ */
    #collage {
      position:fixed;
      inset:0;
      display:grid;
      grid-template-columns: 17fr 21fr 24fr 22fr 16fr;
      grid-template-rows:    42fr 32fr 26fr;
      gap:0;
      will-change:filter,opacity;
    }

    .gi {
      overflow:hidden;
      position:relative;
    }
    .gi img {
      width:100%; height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    /* ── grid placements ── */
    .g1 { grid-column:1/2;  grid-row:1/3;  }   /* tall portrait LEFT, rows 1-2     */
    .g2 { grid-column:2/3;  grid-row:1/2;  }   /* small top left-centre             */
    .g3 { grid-column:3/4;  grid-row:1/4;  }   /* DOMINANT centre, full height      */
    .g4 { grid-column:4/6;  grid-row:1/2;  }   /* wide landscape top right          */
    .g5 { grid-column:2/3;  grid-row:2/3;  }   /* mid left-centre                   */
    .g6 { grid-column:4/5;  grid-row:2/3;  }   /* mid right                         */
    .g7 { grid-column:5/6;  grid-row:2/4;  }   /* portrait right, rows 2-3          */
    .g8 { grid-column:1/3;  grid-row:3/4;  }   /* wide landscape bottom left        */
    .g9 { grid-column:4/5;  grid-row:3/4;  }   /* small bottom right                */

    /* ── stickers (Summer Nights / Fleurs d'Amour style) ── */
    .lbl {
      position:absolute;
      font-family:'Caveat',cursive;
      font-weight:700;
      color:#fff;
      text-shadow:0 2px 8px rgba(0,0,0,.55);
      pointer-events:none;
      line-height:1.2;
      z-index:2;
    }
    /* cream box sticker — like "SUMMER NIGHTS." label */
    .lbl.box {
      background:rgba(242,232,215,.93);
      color:#1a1208;
      text-shadow:none;
      padding:5px 12px 7px;
    }
    /* dark chip sticker — like "DISCOVER A NEW WORLD DOWN YOUR PHONE" */
    .lbl.chip {
      background:rgba(15,12,8,.82);
      color:#f2e8d8;
      text-shadow:none;
      padding:5px 10px 6px;
      font-size:13px;
      letter-spacing:.5px;
    }
    /* "MEMORIES MAKE ME SMILE" plate style */
    .lbl.plate {
      background:#fff;
      color:#1a1208;
      text-shadow:none;
      border:2px solid #1a1208;
      padding:4px 10px 5px;
      font-family:'DM Sans',sans-serif;
      font-size:12px;
      font-weight:700;
      letter-spacing:2px;
      text-transform:uppercase;
    }

    /* ── polaroid accent photos (floating on top) ── */
    .acc {
      position:fixed;
      background:#fff;
      padding:5px 5px 18px;
      box-shadow:0 6px 24px rgba(0,0,0,.38);
      z-index:6;
      overflow:hidden;
    }
    .acc img { width:100%;height:100%;object-fit:cover;display:block; }

    /* ── floating icons ── */
    .fi {
      position:fixed;font-size:20px;
      pointer-events:none;z-index:7;
      animation:flt 5s ease-in-out infinite;
      filter:drop-shadow(0 2px 4px rgba(0,0,0,.4));
    }
    @keyframes flt {
      0%,100%{ transform:translateY(0) rotate(0deg); }
      50%    { transform:translateY(-10px) rotate(7deg); }
    }

    /* ══ VEIL ══ */
    #veil {
      position:fixed;inset:0;
      background:#0a0806;
      opacity:0;z-index:10;
      pointer-events:none;
      will-change:opacity;
    }

    /* ══ NAME ══ */
    #nameWrap {
      position:fixed;
      top:50%;left:50%;
      transform:translate(-50%,-52%);
      z-index:11;text-align:center;
      pointer-events:none;
      line-height:0.86;
    }
    .nline { display:block;overflow:hidden; }
    .nword {
      display:inline-block;
      font-family:'Playfair Display',serif;
      font-weight:700;
      font-size:clamp(80px,14vw,160px);
      color:#f2e8d8;
      letter-spacing:-3px;
      transform:translateY(112%);
      will-change:transform;
    }

    /* ══ PHRASE ══ */
    #phrase {
      position:fixed;
      bottom:9%;left:50%;
      transform:translateX(-50%) translateY(28px);
      z-index:11;text-align:center;
      opacity:0;pointer-events:none;
      width:min(840px,90vw);
      will-change:opacity,transform;
    }
    .ph-age {
      font-size:10px;font-weight:600;
      letter-spacing:5px;text-transform:uppercase;
      color:#c9a96e;margin-bottom:20px;
    }
    .ph-text {
      font-family:'Playfair Display',serif;
      font-size:clamp(23px,3.7vw,44px);
      font-weight:700;font-style:italic;
      color:#f2e8d8;line-height:1.4;
    }
    .ph-text em { color:#c9a96e;font-style:normal; }

    /* ══ SCROLL HINT ══ */
    #hint {
      position:fixed;bottom:22px;left:50%;
      transform:translateX(-50%);z-index:20;
      display:flex;flex-direction:column;align-items:center;gap:8px;
    }
    #hint .ln { width:1px;height:36px;background:linear-gradient(to bottom,rgba(200,180,140,.7),transparent);animation:lp 2s ease-in-out infinite; }
    #hint .tx { font-size:8px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(200,180,140,.45); }
    @keyframes lp { 0%,100%{opacity:.3}50%{opacity:1} }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="curR"></div>

<!-- ══ COLLAGE ══ -->
<div id="collage">

  <!-- g1: full-height left — like the dancing girl in Summer Nights -->
  <div class="gi g1">
    <img src="images/IMG_1693.JPG" style="object-position:center 12%;"/>
  </div>

  <!-- g2: small top cell — like the vinyl record / swing area -->
  <div class="gi g2">
    <img src="images/IMG_2335.JPG" style="object-position:center 40%;"/>
    <div class="lbl" style="bottom:10px;left:10px;font-size:15px;transform:rotate(-2deg);">golden hour ✨</div>
  </div>

  <!-- g3: DOMINANT centre — like the reading girl, full height, all eyes go here -->
  <div class="gi g3">
    <img src="images/IMG_2095.JPG" style="object-position:center 38%;"/>
  </div>

  <!-- g4: wide top right — like the park/swing landscape -->
  <div class="gi g4">
    <img src="images/ARIRANG TOUR.jpeg" style="object-position:center 50%;"/>
    <div class="lbl box" style="bottom:14px;left:16px;font-size:20px;transform:rotate(-1deg);">k-pop is life. 🎵</div>
  </div>

  <!-- g5: mid left-centre — like the cat / strawberries -->
  <div class="gi g5">
    <img src="images/reading with music _.jpeg" style="object-position:center 35%;"/>
    <div class="lbl chip" style="bottom:10px;left:10px;">currently reading 📖</div>
  </div>

  <!-- g6: mid right — like the hat girl -->
  <div class="gi g6">
    <img src="images/IMG_2337.JPG" style="object-position:center 25%;"/>
    <div class="lbl" style="top:10px;right:10px;font-size:14px;">take me there ✈️</div>
  </div>

  <!-- g7: portrait right, rows 2-3 — like Converse / memories shot -->
  <div class="gi g7">
    <img src="images/IMG_1954.jpg" style="object-position:center 12%;"/>
    <div class="lbl plate" style="bottom:12px;left:50%;transform:translateX(-50%);white-space:nowrap;">GOOD TIMES</div>
  </div>

  <!-- g8: wide bottom left — like the waffles / food wide shot -->
  <div class="gi g8">
    <img src="images/IMG_1774.JPG" style="object-position:center 55%;"/>
    <div class="lbl box" style="bottom:14px;left:16px;font-size:20px;transform:rotate(-1deg);">melbourne nights. 🌙</div>
  </div>

  <!-- g9: small bottom right — like the pizza shot -->
  <div class="gi g9">
    <img src="images/IMG_2026.JPG" style="object-position:center 30%;"/>
    <div class="lbl chip" style="bottom:10px;right:10px;">discover melbourne</div>
  </div>

</div>

<!-- ── polaroid accents (Fleurs d'Amour scattered feel) ── -->
<div class="acc" style="top:24%;left:16%;width:15vw;height:20vh;transform:rotate(-7deg);z-index:6;">
  <img src="images/IMG_1910.JPG" style="object-position:center 12%;"/>
</div>
<div class="acc" style="bottom:18%;left:32%;width:13vw;height:17vh;transform:rotate(6deg);z-index:6;">
  <img src="images/IMG_1694.JPG"/>
</div>

<!-- floating icons -->
<div class="fi" style="top:16%;left:20%;animation-delay:0s;">🎶</div>
<div class="fi" style="bottom:24%;right:16%;animation-delay:1.3s;animation-duration:6s;">📚</div>
<div class="fi" style="top:52%;left:6%;animation-delay:0.7s;animation-duration:7s;font-size:14px;">♪</div>
<div class="fi" style="top:8%;left:56%;animation-delay:1.9s;animation-duration:5.5s;">🎧</div>
<div class="fi" style="bottom:32%;left:44%;animation-delay:2.2s;font-size:13px;">✦</div>

<!-- veil -->
<div id="veil"></div>

<!-- name -->
<div id="nameWrap">
  <span class="nline"><span class="nword" id="wR">Riya</span></span>
  <span class="nline"><span class="nword" id="wV">Virdi</span></span>
</div>

<!-- phrase -->
<div id="phrase">
  <div class="ph-age">19 &nbsp;·&nbsp; Melbourne, Australia</div>
  <p class="ph-text">
    melbourne girl with a whole world<br/>
    on her vision board —<br/>
    <em>somewhere between figuring it out<br/>and having it all planned</em>
  </p>
</div>

<!-- scroll hint -->
<div id="hint">
  <div class="ln"></div>
  <div class="tx">scroll</div>
</div>

<script>
  const cur=document.getElementById('cur'),curR=document.getElementById('curR');
  document.addEventListener('mousemove',e=>{
    cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px';
    curR.style.left=e.clientX+'px';curR.style.top=e.clientY+'px';
  });

  const collage=document.getElementById('collage');
  const veil=document.getElementById('veil');
  const wR=document.getElementById('wR');
  const wV=document.getElementById('wV');
  const phrase=document.getElementById('phrase');
  const hint=document.getElementById('hint');

  let tY=0,cY=0;
  const MAX=window.innerHeight*2.2;

  window.addEventListener('wheel',e=>{
    e.preventDefault();
    tY=Math.max(0,Math.min(MAX,tY+e.deltaY*.88));
  },{passive:false});

  let ty0=0;
  window.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchmove',e=>{
    e.preventDefault();
    const d=ty0-e.touches[0].clientY;ty0=e.touches[0].clientY;
    tY=Math.max(0,Math.min(MAX,tY+d*1.8));
  },{passive:false});

  const cl=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lr=(a,b,t)=>a+(b-a)*t;
  const eo=t=>1-Math.pow(1-t,3);
  const pg=(y,s,e)=>cl((y-s)/(e-s),0,1);

  function tick(){
    cY=lr(cY,tY,.072);
    const y=cY,vh=window.innerHeight;

    const cP=eo(pg(y,vh*.12,vh*.95));
    collage.style.filter=`blur(${(cP*22).toFixed(1)}px)`;
    collage.style.opacity=(1-cP*.5).toFixed(3);
    veil.style.opacity=(cP*.92).toFixed(3);

    const rP=eo(pg(y,vh*.32,vh*.75));
    wR.style.transform=`translateY(${((1-rP)*112).toFixed(1)}%)`;

    const vP=eo(pg(y,vh*.48,vh*.90));
    wV.style.transform=`translateY(${((1-vP)*112).toFixed(1)}%)`;

    const pP=eo(pg(y,vh*1.15,vh*1.65));
    phrase.style.opacity=pP.toFixed(3);
    phrase.style.transform=`translateX(-50%) translateY(${((1-pP)*26).toFixed(1)}px)`;

    hint.style.opacity=(1-pg(y,0,vh*.2)).toFixed(3);

    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
