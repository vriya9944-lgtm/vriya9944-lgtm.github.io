<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Riya Virdi</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f2ede5;
      font-family: 'DM Sans', sans-serif;
      cursor: none;
    }

    /* CURSOR */
    #cur  { position:fixed; width:9px; height:9px; background:#1a1208; border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
    #curR { position:fixed; width:30px; height:30px; border:1.5px solid rgba(150,120,80,.5); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:left .09s,top .09s; }

    /* ── COLLAGE ── */
    #collage {
      position: fixed;
      inset: 0;
      will-change: filter, opacity;
    }

    .photo {
      position: absolute;
      background: #fff;
      padding: 7px 7px 22px 7px;
      box-shadow: 0 6px 28px rgba(0,0,0,.13), 0 1px 4px rgba(0,0,0,.08);
      will-change: transform;
      transition: box-shadow .3s;
    }

    .photo img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* scattered positions */
    .ph1 { width:19vw; height:30vh; top:3%;   left:1%;   transform:rotate(-4deg); z-index:3; }
    .ph2 { width:22vw; height:24vh; top:2%;   left:20%;  transform:rotate(2deg);  z-index:2; }
    .ph3 { width:20vw; height:26vh; top:1%;   left:42%;  transform:rotate(-2deg); z-index:4; }
    .ph4 { width:18vw; height:28vh; top:5%;   left:63%;  transform:rotate(3deg);  z-index:2; }
    .ph5 { width:16vw; height:24vh; top:3%;   right:1%;  transform:rotate(-3deg); z-index:3; }
    .ph6 { width:24vw; height:34vh; top:34%;  left:3%;   transform:rotate(3deg);  z-index:5; }
    .ph7 { width:20vw; height:28vh; top:30%;  left:28%;  transform:rotate(-3deg); z-index:3; }
    .ph8 { width:22vw; height:30vh; top:28%;  right:22%; transform:rotate(2deg);  z-index:4; }
    .ph9 { width:18vw; height:26vh; top:32%;  right:1%;  transform:rotate(-4deg); z-index:2; }
    .ph10{ width:20vw; height:24vh; bottom:2%;left:5%;   transform:rotate(-2deg); z-index:3; }
    .ph11{ width:22vw; height:26vh; bottom:1%;left:27%;  transform:rotate(3deg);  z-index:4; }
    .ph12{ width:20vw; height:28vh; bottom:3%;left:50%;  transform:rotate(-3deg); z-index:3; }
    .ph13{ width:18vw; height:24vh; bottom:2%;right:4%;  transform:rotate(2deg);  z-index:2; }

    /* scrapbook text stickers */
    .sticker {
      position: absolute;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #6a5a4a;
      pointer-events: none;
      z-index: 6;
    }
    .sticker.big {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-style: italic;
      letter-spacing: 0;
      text-transform: none;
      color: #3a2e1e;
      font-weight: 700;
    }

    /* floating music/reading icons */
    .ficon {
      position: absolute;
      font-size: 20px;
      pointer-events: none;
      z-index: 7;
      animation: flt 5s ease-in-out infinite;
    }
    @keyframes flt {
      0%,100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-8px) rotate(5deg); }
    }

    /* ── DARK OVERLAY on scroll ── */
    #veil {
      position: fixed;
      inset: 0;
      background: #0e0b07;
      opacity: 0;
      z-index: 8;
      pointer-events: none;
      will-change: opacity;
    }

    /* ── NAME ── */
    #nameWrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 9;
      text-align: center;
      pointer-events: none;
      line-height: 0.9;
    }

    .name-line {
      display: block;
      overflow: hidden;
    }

    .name-word {
      display: inline-block;
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(80px, 14vw, 170px);
      color: #f5ede0;
      letter-spacing: -3px;
      transform: translateY(110%);
      will-change: transform;
    }

    /* ── PHRASE ── */
    #phrase {
      position: fixed;
      bottom: 12%;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      z-index: 9;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      will-change: opacity, transform;
      width: min(820px, 90vw);
    }

    .phrase-age {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: #c9a96e;
      margin-bottom: 20px;
    }

    .phrase-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(22px, 3.5vw, 42px);
      font-weight: 700;
      font-style: italic;
      color: #f5ede0;
      line-height: 1.4;
    }

    .phrase-text em {
      font-style: normal;
      color: #c9a96e;
    }

    /* ── SCROLL HINT ── */
    #hint {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      will-change: opacity;
    }
    #hint .ln { width:1px; height:36px; background:linear-gradient(to bottom,#a09080,transparent); animation:lp 2s ease-in-out infinite; }
    #hint .tx { font-size:8px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#a09080; }
    @keyframes lp { 0%,100%{opacity:.3} 50%{opacity:1} }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="curR"></div>

<!-- ── COLLAGE ── -->
<div id="collage">

  <!-- photos -->
  <div class="photo ph1"><img src="images/IMG_2095.JPG"/></div>
  <div class="photo ph2"><img src="images/IMG_2335.JPG"/></div>
  <div class="photo ph3"><img src="images/ARIRANG TOUR.jpeg"/></div>
  <div class="photo ph4"><img src="images/IMG_1693.JPG"/></div>
  <div class="photo ph5"><img src="images/reading with music _.jpeg"/></div>
  <div class="photo ph6"><img src="images/IMG_1774.JPG"/></div>
  <div class="photo ph7"><img src="images/IMG_2337.JPG"/></div>
  <div class="photo ph8"><img src="images/IMG_1694.JPG"/></div>
  <div class="photo ph9"><img src="images/IMG_1954.jpg"/></div>
  <div class="photo ph10"><img src="images/IMG_1910.JPG"/></div>
  <div class="photo ph11"><img src="images/IMG_2026.JPG"/></div>
  <div class="photo ph12"><img src="images/IMG_0636.JPG"/></div>
  <div class="photo ph13"><img src="images/IMG_0358.JPG"/></div>

  <!-- scrapbook text stickers -->
  <div class="sticker big" style="top:38%; left:27%; transform:rotate(-6deg);">take me<br/>everywhere</div>
  <div class="sticker" style="bottom:32%; right:20%; transform:rotate(4deg);">✦ currently reading</div>
  <div class="sticker" style="top:62%; left:50%; transform:rotate(-3deg);">now playing 🎵</div>
  <div class="sticker" style="top:14%; left:45%; transform:rotate(2deg); font-size:13px;">melbourne days</div>

  <!-- floating icons -->
  <div class="ficon" style="top:20%; left:23%; animation-delay:0s;">🎵</div>
  <div class="ficon" style="top:52%; right:18%; animation-delay:1s; animation-duration:6s;">📖</div>
  <div class="ficon" style="bottom:28%; left:22%; animation-delay:2s; animation-duration:7s;">🎶</div>
  <div class="ficon" style="top:72%; right:28%; animation-delay:0.5s;">📚</div>
  <div class="ficon" style="top:8%; right:22%; animation-delay:1.5s; animation-duration:8s;">🎧</div>
  <div class="ficon" style="bottom:20%; left:48%; animation-delay:3s; font-size:14px;">✦</div>

</div>

<!-- dark veil -->
<div id="veil"></div>

<!-- NAME -->
<div id="nameWrap">
  <span class="name-line"><span class="name-word" id="wRiya">Riya</span></span>
  <span class="name-line"><span class="name-word" id="wVirdi">Virdi</span></span>
</div>

<!-- CATCHY PHRASE -->
<div id="phrase">
  <div class="phrase-age">19 &nbsp;·&nbsp; Melbourne, Australia</div>
  <p class="phrase-text">
    melbourne girl with a whole world<br/>
    on her vision board —<br/>
    <em>somewhere between figuring it out<br/>and having it all planned</em>
  </p>
</div>

<!-- SCROLL HINT -->
<div id="hint">
  <div class="ln"></div>
  <div class="tx">scroll</div>
</div>

<script>
  /* cursor */
  const cur=document.getElementById('cur'), curR=document.getElementById('curR');
  document.addEventListener('mousemove',e=>{
    cur.style.left=e.clientX+'px'; cur.style.top=e.clientY+'px';
    curR.style.left=e.clientX+'px'; curR.style.top=e.clientY+'px';
  });

  const collage = document.getElementById('collage');
  const veil    = document.getElementById('veil');
  const wRiya   = document.getElementById('wRiya');
  const wVirdi  = document.getElementById('wVirdi');
  const phrase  = document.getElementById('phrase');
  const hint    = document.getElementById('hint');

  let targetY=0, curY=0;
  const MAX = window.innerHeight * 2.3;

  window.addEventListener('wheel', e=>{
    e.preventDefault();
    targetY = Math.max(0, Math.min(MAX, targetY + e.deltaY * 0.88));
  }, {passive:false});

  let ty0=0;
  window.addEventListener('touchstart',e=>{ty0=e.touches[0].clientY;},{passive:true});
  window.addEventListener('touchmove',e=>{
    e.preventDefault();
    const d=ty0-e.touches[0].clientY; ty0=e.touches[0].clientY;
    targetY=Math.max(0,Math.min(MAX,targetY+d*1.8));
  },{passive:false});

  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp=(a,b,t)=>a+(b-a)*t;
  const ease=t=>t<.5?2*t*t:-1+(4-2*t)*t;
  const prog=(y,s,e)=>clamp((y-s)/(e-s),0,1);

  function tick(){
    curY = lerp(curY, targetY, 0.072);
    const y=curY, vh=window.innerHeight;

    /* collage: blur + fade out */
    const colP = ease(prog(y, vh*.15, vh*1.0));
    collage.style.filter  = `blur(${(colP*20).toFixed(1)}px)`;
    collage.style.opacity = (1 - colP*.6).toFixed(3);

    /* veil darkens */
    veil.style.opacity = (colP * .88).toFixed(3);

    /* RIYA slides up (35%–78% of first screen) */
    const rP = ease(prog(y, vh*.35, vh*.78));
    wRiya.style.transform = `translateY(${((1-rP)*110).toFixed(1)}%)`;

    /* VIRDI slides up (50%–90%) */
    const vP = ease(prog(y, vh*.50, vh*.92));
    wVirdi.style.transform = `translateY(${((1-vP)*110).toFixed(1)}%)`;

    /* phrase fades in big (120%–170%) */
    const pP = ease(prog(y, vh*1.2, vh*1.7));
    phrase.style.opacity   = pP.toFixed(3);
    phrase.style.transform = `translateX(-50%) translateY(${((1-pP)*28).toFixed(1)}px)`;

    /* hint fades */
    hint.style.opacity = (1-prog(y,0,vh*.22)).toFixed(3);

    requestAnimationFrame(tick);
  }
  tick();
</script>
</body>
</html>
