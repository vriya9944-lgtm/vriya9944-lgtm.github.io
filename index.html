<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>dance with me 🐱</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { background:#000; overflow:hidden; cursor:none; font-family:'DM Sans',sans-serif; }

    #cur {
      position:fixed; z-index:9999;
      width:12px; height:12px;
      background:#fff; border-radius:50%;
      pointer-events:none;
      transform:translate(-50%,-50%);
      mix-blend-mode:difference;
    }

    /* ── SCREEN 1 — LANDING ── */
    #landing {
      position:fixed; inset:0;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:10px; z-index:20;
      transition:opacity .45s ease, transform .45s ease;
    }
    #landing.out { opacity:0; transform:scale(1.1); pointer-events:none; }

    .star {
      position:absolute; width:3px; height:3px;
      background:#fff; border-radius:50%; opacity:0;
      animation:twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
    }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:.55} }

    .ring {
      position:absolute; border-radius:50%;
      border:1px solid rgba(255,255,255,.07); pointer-events:none;
      animation:pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring { 0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.04);opacity:.9} }

    #welcome {
      font-family:'Caveat',cursive;
      font-size:clamp(20px,3vw,36px);
      font-weight:700; color:rgba(255,255,255,.55); text-align:center;
    }
    #phrase {
      font-family:'Caveat',cursive;
      font-size:clamp(40px,8vw,100px);
      font-weight:700; color:#fff;
      text-align:center; line-height:1.1; padding:0 20px; user-select:none;
    }
    .word {
      display:inline-block;
      transition:transform .18s cubic-bezier(.34,1.56,.64,1), color .18s; cursor:none;
    }
    .word:hover { transform:rotate(-5deg) scale(1.12); color:#ffda79; }
    .word:nth-child(even):hover { transform:rotate(5deg) scale(1.12); }
    #hint {
      font-size:11px; font-weight:500; letter-spacing:4px; text-transform:uppercase;
      color:rgba(255,255,255,.8); margin-top:8px;
      animation:pulse-hint 2s ease-in-out infinite;
    }
    @keyframes pulse-hint { 0%,100%{opacity:.65} 50%{opacity:1} }

    .confetti { position:fixed; width:8px; height:8px; border-radius:2px; pointer-events:none; opacity:0; }

    /* ── SCREEN 2 — DANCE ── */
    #dance {
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:#000; z-index:10;
      clip-path:circle(0% at 50% 50%);
      transition:clip-path .75s cubic-bezier(.4,0,.2,1);
    }
    #dance.open { clip-path:circle(150% at 50% 50%); }

    #cat-wrap {
      position:relative;
      width:clamp(340px,50vw,620px);
      aspect-ratio:1/1;
      overflow:hidden;
      border-radius:20px;
      background:#000;
      cursor:none;
    }

    #cat-gif {
      position:absolute; inset:0;
      width:100%; height:100%;
      object-fit:cover;
    }

    #cat-overlay { position:absolute; inset:0; z-index:3; cursor:none; }

    /* enjoyed — top right */
    #top-cta {
      position:fixed; top:28px; right:32px;
      z-index:30; text-align:right;
      opacity:0; pointer-events:none; transition:opacity .8s ease;
    }
    #top-cta.show { opacity:1; pointer-events:auto; }
    #top-cta p {
      font-family:'Caveat',cursive;
      font-size:clamp(16px,2.2vw,26px);
      font-weight:700; color:#fff; line-height:1.35;
    }
    #top-cta em { font-style:normal; color:#ffda79; display:block; }

    /* scroll down — bottom centre */
    #bot-cta {
      position:fixed; bottom:28px; left:50%;
      transform:translateX(-50%);
      z-index:30; text-align:center;
      opacity:0; pointer-events:none; transition:opacity .8s ease;
    }
    #bot-cta.show { opacity:1; pointer-events:auto; cursor:none; }
    #bot-cta p {
      font-family:'Caveat',cursive;
      font-size:clamp(15px,2vw,22px);
      font-weight:700; color:rgba(255,255,255,.7);
    }
    #bot-cta .arr {
      font-size:18px; color:#ffda79; display:block; margin-top:4px;
      animation:bounce-arr 1.2s ease-in-out infinite;
    }
    @keyframes bounce-arr { 0%,100%{transform:translateY(0)} 50%{transform:translateY(7px)} }
  </style>
</head>
<body>

<div id="cur"></div>

<!-- SCREEN 1 -->
<div id="landing">
  <div class="ring" style="width:min(55vw,380px);height:min(55vw,380px);"></div>
  <div class="ring" style="width:min(75vw,520px);height:min(75vw,520px);animation-delay:.9s;animation-duration:3.5s;"></div>
  <p id="welcome">hi welcome!</p>
  <div id="phrase"></div>
  <p id="hint">click anywhere</p>
</div>

<!-- SCREEN 2 -->
<div id="dance">
  <div id="cat-wrap">
    <!-- scuba cat GIF — black background, auto-loops, no green screen -->
    <img id="cat-gif" alt=""/>
    <div id="cat-overlay"></div>
  </div>
</div>

<!-- top-right text after 2 loops -->
<div id="top-cta">
  <p>enjoyed? but wait —<em>there's more to me ✨</em></p>
</div>

<!-- bottom-centre text after 2 loops -->
<div id="bot-cta">
  <p>look down</p>
  <span class="arr">↓ scroll down ↓</span>
</div>

<!-- audio-only YouTube iframe, hidden off-screen -->
<iframe id="yt-audio"
  style="position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;pointer-events:none;"
  allow="autoplay; encrypted-media">
</iframe>

<script>
  /* cursor */
  const cur = document.getElementById('cur');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });

  /* landing phrase */
  const words = ['click','here','to','dance','with','me'];
  const phraseEl = document.getElementById('phrase');
  words.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'word'; s.textContent = w;
    phraseEl.appendChild(s);
    if (i < words.length - 1) phraseEl.appendChild(document.createTextNode(' '));
  });

  /* stars */
  const landing = document.getElementById('landing');
  for (let i = 0; i < 65; i++) {
    const s = document.createElement('div'); s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*3}s;--delay:${Math.random()*3}s;`;
    landing.appendChild(s);
  }

  /* confetti */
  const COLS = ['#ffda79','#ff79c6','#a29bfe','#74b9ff','#55efc4','#fd79a8','#fff'];
  function burst(x, y) {
    for (let i = 0; i < 55; i++) {
      const el = document.createElement('div'); el.className = 'confetti';
      el.style.cssText = `background:${COLS[Math.floor(Math.random()*COLS.length)]};left:${x}px;top:${y}px;border-radius:${Math.random()>.5?'50%':'2px'};`;
      document.body.appendChild(el);
      const a = Math.random()*Math.PI*2, d = 80+Math.random()*220;
      el.animate([
        {opacity:1,transform:'translate(0,0) rotate(0deg) scale(1)'},
        {opacity:0,transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px) rotate(${(Math.random()-.5)*720}deg) scale(0)`}
      ], {duration:500+Math.random()*500, easing:'cubic-bezier(.2,.8,.5,1)', fill:'forwards'});
      setTimeout(() => el.remove(), 600);
    }
  }

  /* dance logic */
  const catGif  = document.getElementById('cat-gif');
  const ytAudio = document.getElementById('yt-audio');
  const topCta  = document.getElementById('top-cta');
  const botCta  = document.getElementById('bot-cta');
  const dance   = document.getElementById('dance');

  /* scuba cat GIF (black bg) + original scuba cat video for audio */
  const GIF_SRC   = 'https://media1.tenor.com/m/Rd0jrWH5JjgAAAAd/cat-scuba.gif';
  const AUDIO_SRC = 'https://www.youtube.com/embed/hrQzECgGiP0' +
    '?autoplay=1&mute=0&controls=0&rel=0&playsinline=1' +
    '&disablekb=1&fs=0&iv_load_policy=3&modestbranding=1&loop=1&playlist=hrQzECgGiP0';

  const GIF_LOOP_MS = 10100; // GIF is ~10.1 s per loop
  let loopTimer = null;

  function startDance() {
    /* restart GIF from frame 1 */
    catGif.src = '';
    catGif.src = GIF_SRC;
    /* restart audio */
    ytAudio.src = AUDIO_SRC;
    /* show "enjoyed" text after 2 full GIF loops */
    clearTimeout(loopTimer);
    loopTimer = setTimeout(() => {
      topCta.classList.add('show');
      setTimeout(() => botCta.classList.add('show'), 400);
    }, GIF_LOOP_MS * 2);
  }

  /* click cat → hide text and restart */
  document.getElementById('cat-overlay').addEventListener('click', () => {
    topCta.classList.remove('show');
    botCta.classList.remove('show');
    startDance();
  });

  /* landing click */
  let clicked = false;
  landing.addEventListener('click', e => {
    if (clicked) return; clicked = true;
    startDance(); /* called synchronously in click handler → audio autoplay allowed */
    burst(e.clientX, e.clientY);
    setTimeout(() => {
      landing.style.display = 'none';
      dance.style.zIndex = '15';
      requestAnimationFrame(() => requestAnimationFrame(() => dance.classList.add('open')));
    }, 480);
  });
</script>
</body>
</html>
